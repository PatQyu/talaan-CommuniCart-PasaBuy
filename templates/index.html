<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CommuniCart | Auth</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
	<main class="auth-page">
		<section class="auth-brand">
			<h1>TaLaan</h1>
			<p>
				paragraph placeholder
			</p>
		</section>

		<section class="auth-panel">
			<div class="auth-tabs" role="tablist" aria-label="Authentication Tabs">
				<button id="login-tab" class="tab_is_active" type="button">Login</button>
				<button id="register-tab" class="tab" type="button">Create Account</button>
			</div>

			<form id="login-form" class="auth-form" action="#" method="post">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Enter password" required>

				<div class="auth-row">
					<label class="checkbox_wrap" for="remember">
						<input id="remember" name="remember" type="checkbox"> Remember me
					</label>
					<a href="#">Forgot password?</a>
				</div>
				<button class="btn-primary" type="submit">Sign In</button>
			
				<p class="auth-footnote">
					Don't have an account? Sign up <a href="#" id="register_sc">here</a>
				</p>
			</form>

			<form id="register-form"class="auth-form is-hidden" action="#" method="post">
				<label for="new-username">Username</label>
				<input id="new-username" name="username" type="text" placeholder="Enter username" required>

				<label for="new-email">Email</label>
				<input id="new-email" name="email" type="email" placeholder="you@example.com" required>

				<label for="new-password">Password</label>
				<input id="new-password" name="password" type="password" placeholder="Enter password" required>

				<button class="btn-primary" type="submit">Create Account</button>

				<p class="auth-footnote">
					Already have an account? Login <a href="#" id="login_sc">here</a>
				</p>
			</form>

		</section>
	</main>

	<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
